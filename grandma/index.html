function saveProgress(i) { try { localStorage.setItem('wgo-lesson', String(i)); } catch (e) {} }
function loadProgress() { try { const v = localStorage.getItem('wgo-lesson'); return v === null ? null : parseInt(v); } catch (e) { return null; } }
let ignoreHash = false;
function setHash(h) { if (location.hash !== h) { ignoreHash = true; location.hash = h; } }

let currentLesson = -1;
let utterance = null;

function stopReading() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  btnRead.textContent = 'Read to me';
  btnRead.classList.remove('speaking');
  btnRead.setAttribute('aria-pressed', 'false');
}

function startReading() {
  if (!window.speechSynthesis) {
    alert("Sorry, your browser does not support read-aloud. Try Chrome or Edge.");
    return;
  }
  stopReading();
  let text = '';
  if (currentLesson === -1) {
    text = "Welcome. This is What's Going On - a plain English guide to American politics in twenty short lessons. Use the buttons at the bottom to begin.";
  } else {
    const l = lessons[currentLesson];
    const tmp = document.createElement('div');
    tmp.innerHTML = l.body;
    text = l.title + '. ' + tmp.textContent.replace(/\s+/g, ' ').trim();
  }
  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;
  utterance.pitch = 1.0;
  utterance.onend = () => {
    btnRead.textContent = 'Read to me';
    btnRead.classList.remove('speaking');
  };
  btnRead.textContent = 'Stop reading';
  btnRead.classList.add('speaking');
  btnRead.setAttribute('aria-pressed', 'true');
  window.speechSynthesis.speak(utterance);
}

function linkify(root, map, wrap) {
  const names = Object.keys(map).sort((a, b) => b.length - a.length);
  const used = new Set();
  const queue = [];
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  while (walker.nextNode()) queue.push(walker.currentNode);
  while (queue.length) {
    const node = queue.shift();
    if (!node.parentElement || node.parentElement.closest('a, button, .sources, .gdef, h2')) continue;
    const text = node.nodeValue;
    let hit = null, at = -1;
    for (const name of names) {
      if (used.has(map[name])) continue;
      const idx = text.indexOf(name);
      if (idx !== -1 && (at === -1 || idx < at)) { hit = name; at = idx; }
    }
    if (!hit) continue;
    used.add(map[hit]);
    const after = node.splitText(at);
    after.nodeValue = after.nodeValue.slice(hit.length);
    node.parentNode.insertBefore(wrap(hit, map[hit]), after);
    queue.unshift(after);
  }
}
function applyDepth(article) {
  linkify(article, NOTES, (name, path) => {
    const a = document.createElement('a');
    a.href = noteUrl(path); a.target = '_blank'; a.rel = 'noopener'; a.className = 'notelink';
    a.title = 'Open the research note in the vault';
    a.textContent = name;
    return a;
  });
  linkify(article, GLOSS, (name, def) => {
    const s = document.createElement('span');
    s.className = 'gterm'; s.setAttribute('role', 'button'); s.setAttribute('tabindex', '0');
    s.setAttribute('data-def', def); s.title = 'Tap for a plain-English definition';
    s.textContent = name;
    return s;
  });
}
function shareGuide(url, title) {
  const data = { title: title, text: 'American politics explained in twenty short lessons anyone can read.', url: url };
  if (navigator.share) { navigator.share(data).catch(() => {}); return true; }
  if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(url); return false; }
  return false;
}

function renderHome() {
  stopReading();
  currentLesson = -1;
  setHash('#lessons');

  if (saved !== null && !isNaN(saved) && saved >= 0 && saved < lessons.length) {
    html += '<div class="resume-banner">Welcome back. You were on <strong>Lesson ' + (saved + 1) + '</strong>.<button id="resume">Pick up where I left off</button></div>';
  }
  html += '<div class="lesson-list"><h2>The Twenty Lessons</h2><p style="font-size:20px;color:var(--ink-soft);">Tap any lesson to jump to it. Or just hit Next and read them in order.</p>';
  parts.forEach(p => {
    html += '<div class="part">' + p.name + '</div><ol start="' + (p.from + 1) + '">';
    for (let i = p.from; i <= p.to; i++) {
      html += '<li><a href="#lesson-' + (i + 1) + '" data-i="' + i + '">' + lessons[i].title + '</a></li>';
    }
    html += '</ol>';
  });
  html += '<div class="home-actions"><button id="printall">Print the whole guide</button><a class="abtn" href="whats-going-on.pdf" download>Download as PDF</a><button id="sharehome">Share this guide</button></div>';
  html += '<p style="margin-top:20px;font-size:17px;color:var(--ink-soft);">Last updated ' + LAST_UPDATED + '. Every lesson now ends with links to the research behind it.</p></div>';
  content.innerHTML = html;

  progressFill.style.width = '0%';
  btnPrev.disabled = true;
  btnNext.disabled = false;
  btnNext.textContent = 'Start Lesson 1';

    a.addEventListener('click', (e) => {
      e.preventDefault();
      goTo(parseInt(a.getAttribute('data-i')));
    });
  });
  const rb = document.getElementById('resume');
  if (rb) rb.addEventListener('click', () => goTo(saved));
  const pa = document.getElementById('printall');
  if (pa) pa.addEventListener('click', printAll);
  const sh = document.getElementById('sharehome');
  if (sh) sh.addEventListener('click', () => {
    if (!shareGuide(GUIDE, "What's Going On - A Plain English Guide")) { sh.textContent = 'Link copied - paste it anywhere'; setTimeout(() => { sh.textContent = 'Share this guide'; }, 2500); }
  });
  window.scrollTo(0, 0);
}

function printAll() {
  stopReading();

    html += '<article><h2>Lesson ' + (i + 1) + ': ' + l.title + '</h2>' + l.body + '</article>';
  });
  content.innerHTML = html;
  window.print();
  applyHash();
}

function renderLesson(i) {
  stopReading();
  currentLesson = i;
  setHash('#lesson-' + (i + 1));
  saveProgress(i);
  const l = lessons[i];
  const srcs = SOURCES[i] || [];
  let foot = '';
  if (srcs.length) {
    foot = '<div class="sources"><h3>Where this comes from</h3>'
      + '<p class="star">&#11088; <strong>If you read one thing:</strong> <a href="' + noteUrl(srcs[0].p) + '" target="_blank" rel="noopener">' + srcs[0].t + '</a></p><ul>'
      + srcs.slice(1).map(s => '<li><a href="' + noteUrl(s.p) + '" target="_blank" rel="noopener">' + s.t + '</a></li>').join('')
      + '</ul><p class="tiernote">' + TIER_NOTE + '</p>'
      + '<button class="copylink" id="sharebtn">Share this lesson</button> '
      + '<button class="copylink" id="copylink">Copy a link to this lesson</button></div>';
  }
  content.innerHTML = '<article><h2>Lesson ' + (i+1) + ': ' + l.title + '</h2>' + l.body + foot + '</article>';
  applyDepth(content.querySelector('article'));
  const sb = document.getElementById('sharebtn');
  if (sb) sb.addEventListener('click', () => {
    const stub = GUIDE + 'lesson-' + (i + 1) + '.html';
    if (!shareGuide(stub, 'Lesson ' + (i + 1) + ': ' + l.title)) { sb.textContent = 'Link copied - paste it anywhere'; setTimeout(() => { sb.textContent = 'Share this lesson'; }, 2500); }
  });
  const cl = document.getElementById('copylink');
  if (cl) cl.addEventListener('click', () => {
    const url = GUIDE + 'lesson-' + (i + 1) + '.html';
    const done = () => { cl.textContent = 'Link copied - paste it anywhere'; setTimeout(() => { cl.textContent = 'Copy a link to this lesson'; }, 2500); };
    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(url).then(done).catch(() => { cl.textContent = url; }); }
    else { cl.textContent = url; }
  });
  progressText.textContent = 'Lesson ' + (i+1) + ' of ' + lessons.length;
  progressFill.style.width = (((i+1) / lessons.length) * 100) + '%';
  btnPrev.disabled = false;
  btnNext.disabled = false;
  btnNext.textContent = (i === lessons.length - 1) ? 'Finish' : 'Next';
  window.scrollTo(0, 0);
}

function renderDone() {
  stopReading();
  currentLesson = lessons.length;
  setHash('#done');
  content.innerHTML = '<article><h2>You made it.</h2>'

  const pd = document.getElementById('printdone');
  if (pd) pd.addEventListener('click', printAll);
  const rs = document.getElementById('restart');
  if (rs) rs.addEventListener('click', () => goTo(0));
  window.scrollTo(0, 0);

function goTo(i) {
  if (i < 0) renderHome();
  else if (i >= lessons.length) return;
  else renderLesson(i);
}

btnHome.addEventListener('click', renderHome);
btnPrev.addEventListener('click', () => {
  if (currentLesson === 0) renderHome();
  else if (currentLesson >= lessons.length) renderLesson(lessons.length - 1);
  else if (currentLesson > 0) goTo(currentLesson - 1);
});
btnNext.addEventListener('click', () => {
  if (currentLesson === lessons.length - 1) renderDone();
  else if (currentLesson < lessons.length - 1) goTo(currentLesson + 1);
});
btnRead.addEventListener('click', () => {
  if (btnRead.classList.contains('speaking')) stopReading();
  else startReading();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' && !btnNext.disabled) btnNext.click();
  else if (e.key === 'ArrowLeft') btnPrev.click();
});

content.addEventListener('click', (e) => {
  const t = e.target.closest('.gterm');
  if (!t) return;
  const next = t.parentElement.nextElementSibling;
  if (next && next.className === 'gdef' && next.getAttribute('data-for') === t.textContent) { next.remove(); return; }
  document.querySelectorAll('.gdef').forEach(d => d.remove());
  const d = document.createElement('div');
  d.className = 'gdef'; d.setAttribute('data-for', t.textContent);
  d.innerHTML = '<strong>' + t.textContent + ':</strong> ' + t.getAttribute('data-def') + ' <a href="' + noteUrl('00-Home/Plain English Glossary') + '" target="_blank" rel="noopener">Full glossary</a>';
  t.parentElement.insertAdjacentElement('afterend', d);
});
content.addEventListener('keydown', (e) => {
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList && e.target.classList.contains('gterm')) { e.preventDefault(); e.target.click(); }
});

function applyHash() {
  if (location.hash === '#done') { renderDone(); return; }
  const m = location.hash.match(/^#lesson-(\d+)$/);
  if (m) {
    const n = parseInt(m[1]);
    if (n >= 1 && n <= lessons.length) { renderLesson(n - 1); return; }
  }
  renderHome();
}
window.addEventListener('hashchange', () => {
  if (ignoreHash) { ignoreHash = false; return; }
  applyHash();
});
document.getElementById('updated').textContent = 'Last updated ' + LAST_UPDATED;
applyHash();
